tempo:
  tempo:
    metricsGenerator:
      # -- If true, enables Tempo's metrics generator (https://grafana.com/docs/tempo/next/metrics-generator/)
      enabled: true
      remoteWriteUrl: "http://metrics-monitoring.lab.suxessit.k8s.cloud.uibk.ac.at"
  tempoQuery:
    # -- if False the tempo-query container is not deployed
    enabled: true
  serviceMonitor:
    enabled: true
